services:
  epsign:
    build: .
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./state:/app/state:rw
      - ./public:/app/public:ro
    env_file:
      - ./packages/doorsign/.env
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - SERVER_PORT=3000
      - NODE_ENV=production
    restart: unless-stopped
